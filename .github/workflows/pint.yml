name: Pint (Code Style)

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  pint:
    runs-on: ubuntu-latest
    name: PHP Code Style

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:latest
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Pint
        run: vendor/bin/pint --test

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        if: failure()
        with:
          commit_message: "style: apply pint fixes"
          commit_options: "--no-verify"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
