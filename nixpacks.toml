# Nixpacks Configuration for Railway
# Docs: https://nixpacks.com/docs/configuration/file

[phases.setup]
nixPkgs = ['php84', 'php84Packages.composer', 'postgresql']

[phases.install]
cmds = [
  'composer install --optimize-autoloader --no-dev --no-interaction'
]

[phases.build]
cmds = [
  'composer dump-autoload --optimize'
]

[start]
cmd = 'php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan serve --host=0.0.0.0 --port=$PORT'
